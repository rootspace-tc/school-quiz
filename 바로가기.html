        const container = document.getElementById('main-container');
        const linkList = document.getElementById('link-list');
        const formModal = document.getElementById('form-modal');
        const actionModal = document.getElementById('action-modal');
        const notification = document.getElementById('notification');
        const saveAsFileBtn = document.getElementById('save-as-file-btn');
        const addFolderBtn = document.getElementById('add-folder-btn');
        const breadcrumbs = document.getElementById('breadcrumbs');
        
        // --- ✨ [요청 1] 순서 변경 모드 변수 및 버튼 ---
        const reorderModeBtn = document.getElementById('reorder-mode-btn');
        let isReorderMode = false;

        let currentActionItem = null;
        let editingItem = null;
        let draggedItemInfo = null; 
        
        let navigationStack = [{ name: 'Home', items: dataStore }];

        const colors = ['#ffadad', '#ffd6a5', '#fdffb6', '#caffbf', '#9bf6ff', '#a0c4ff', '#bdb2ff', '#ffc6ff'];

        function showNotification(message) {
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => { notification.classList.remove('show'); }, 2000);
        }

        // --- 상위 폴더 이동 핸들러 ---
        function handleBreadcrumbDragOver(e) {
            e.preventDefault();
            // 순서 변경 모드일 때는 상위 폴더 이동 금지
            if (!isReorderMode) {
                breadcrumbs.classList.add('drag-over');
            }
        }
        function handleBreadcrumbDragLeave() {
            breadcrumbs.classList.remove('drag-over');
        }
        function handleBreadcrumbDrop(e) {
            e.preventDefault();
            breadcrumbs.classList.remove('drag-over');

            // 순서 변경 모드가 아니고, Home이 아닐 때만 작동
            if (!isReorderMode && draggedItemInfo && navigationStack.length > 1) {
                const parentItems = navigationStack[navigationStack.length - 2].items;
                const itemToMove = draggedItemInfo.fromArray.splice(draggedItemInfo.index, 1)[0];
                parentItems.push(itemToMove);
                
                draggedItemInfo = null;
                renderCurrentView();
                showNotification('상위 폴더로 이동했습니다. [파일로 저장하기]를 눌러주세요!');
            }
        }

        // --- 현재 폴더 뷰 렌더링 함수 ---
        function renderCurrentView() {
            linkList.innerHTML = '';
            
            const currentFolder = navigationStack[navigationStack.length - 1];
            const currentItems = currentFolder.items;

            renderBreadcrumbs();

            // 아이템 렌더링
            currentItems.forEach((item, index) => {
                const listItem = document.createElement('li');
                listItem.textContent = item.name;
                listItem.draggable = true;

                listItem.addEventListener('dragstart', (e) => {
                    draggedItemInfo = { item, fromArray: currentItems, index };
                    e.dataTransfer.effectAllowed = 'move';
                });

                if (item.type === 'link') {
                    listItem.className = 'link-item';
                    listItem.style.backgroundColor = colors[index % colors.length];
                    // --- ✨ [요청 2] 링크 클릭 시 모달 열기 ---
                    listItem.addEventListener('click', () => {
                        openActionModal(item, currentItems, index);
                    });
                } else if (item.type === 'folder') {
                    listItem.className = 'folder-item';
                    listItem.textContent = '📁 ' + item.name;
                    
                    if (item.color) {
                        listItem.style.backgroundColor = item.color;
                        listItem.style.borderColor = item.color;
                    }
                    
                    // --- ✨ [요청 2] 폴더 클릭 시 모달 열기 (네비게이션 대신) ---
                    listItem.addEventListener('click', () => {
                        openActionModal(item, currentItems, index);
                    });
                }

                // --- 드래그/드롭 핸들러 ---
                listItem.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    
                    if (isReorderMode) {
                        // 순서 변경 모드일 때는 항상 '순서 변경' 강조
                        listItem.classList.add('drag-over-reorder');
                    } else if (item.type === 'folder') {
                        // 기본 모드일 때는 폴더만 '이동' 강조
                        listItem.classList.add('drag-over');
                    }
                });
                listItem.addEventListener('dragleave', () => {
                    listItem.classList.remove('drag-over');
                    listItem.classList.remove('drag-over-reorder');
                });
                
                // --- ✨ [요청 1] 드롭 로직 (모드에 따라 분리) ---
                listItem.addEventListener('drop', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    listItem.classList.remove('drag-over');
                    listItem.classList.remove('drag-over-reorder');

                    if (!draggedItemInfo || draggedItemInfo.item === item) return;

                    const sourceArray = draggedItemInfo.fromArray;
                    const currentArray = currentItems;
                    const originalIndex = draggedItemInfo.index;
                    const targetIndex = index;
                    let reordered = false;

                    // --- [순서 변경 모드] ---
                    if (isReorderMode) {
                        if (sourceArray === currentArray) { // 같은 폴더 내에서만 순서 변경
                            const newTargetIndex = (originalIndex < targetIndex) ? targetIndex - 1 : targetIndex;
                            const [movedItem] = sourceArray.splice(originalIndex, 1);
                            sourceArray.splice(newTargetIndex, 0, movedItem);
                            showNotification('순서가 변경되었습니다.');
                            reordered = true;
                        }
                    } 
                    // --- [기본 모드 (이동)] ---
                    else {
                        const targetItem = item;
                        // Case 1: [폴더 안으로 이동] - 드롭 대상이 '폴더'일 때
                        if (targetItem.type === 'folder' && draggedItemInfo.fromArray !== targetItem.items) {
                            const itemToMove = sourceArray.splice(originalIndex, 1)[0];
                            targetItem.items.push(itemToMove);
                            showNotification(`'${itemToMove.name}'을(를) '${targetItem.name}' 폴더로 이동했습니다.`);
                            reordered = true;
                        }
                        // Case 2: [순서 변경] - 드롭 대상이 '링크'일 때 (기본 모드에서는 링크 위 드롭으로만 순서 변경)
                        else if (targetItem.type === 'link' && sourceArray === currentArray) {
                            const newTargetIndex = (originalIndex < targetIndex) ? targetIndex - 1 : targetIndex;
                            const [movedItem] = sourceArray.splice(originalIndex, 1);
                            sourceArray.splice(newTargetIndex, 0, movedItem);
                            showNotification('항목 순서가 변경되었습니다.');
                            reordered = true;
                        }
                    }

                    draggedItemInfo = null;
                    if (reordered) {
                        renderCurrentView(); // 변경이 일어났을 때만 렌더링
                    }
                });
                // --- 드롭 로직 끝 ---

                linkList.appendChild(listItem);
            });

            // '새 링크 추가' 버튼 렌더링
            const addButton = document.createElement('li');
            addButton.id = 'add-btn';
            addButton.className = 'link-item';
            addButton.textContent = '+';
            addButton.addEventListener('click', () => {
                editingItem = null;
                openFormModal('link');
            });
            linkList.appendChild(addButton);
        }

        // --- 경로(Breadcrumbs) 렌더링 함수 ---
        function renderBreadcrumbs() {
            breadcrumbs.innerHTML = '';
            breadcrumbs.removeEventListener('dragover', handleBreadcrumbDragOver);
            breadcrumbs.removeEventListener('dragleave', handleBreadcrumbDragLeave);
            breadcrumbs.removeEventListener('drop', handleBreadcrumbDrop);

            navigationStack.forEach((folder, index) => {
                const link = document.createElement('span');
                link.textContent = folder.name;

                if (index < navigationStack.length - 1) {
                    link.className = 'breadcrumb-link';
                    link.addEventListener('click', () => {
                        navigationStack = navigationStack.slice(0, index + 1);
                        renderCurrentView();
                    });
                    breadcrumbs.appendChild(link);
                    
                    const separator = document.createElement('span');
                    separator.className = 'breadcrumb-separator';
                    separator.textContent = '>';
                    breadcrumbs.appendChild(separator);
                } else {
                    breadcrumbs.appendChild(link);
                }
            });

            // Home이 아닐 경우에만 상위 폴더 이동 리스너 추가
            if (navigationStack.length > 1) {
                breadcrumbs.addEventListener('dragover', handleBreadcrumbDragOver);
                breadcrumbs.addEventListener('dragleave', handleBreadcrumbDragLeave);
                breadcrumbs.addEventListener('drop', handleBreadcrumbDrop);
            }
        }

        // --- ✨ [요청 2] 액션 모달 열기 (수정됨) ---
        function openActionModal(item, itemArray, index) {
            currentActionItem = { item, array: itemArray, index };
            document.getElementById('action-title').textContent = item.name;
            
            const primaryBtn = document.getElementById('action-primary-btn');
            const copyBtn = document.getElementById('action-copy-btn');
            
            if (item.type === 'link') {
                primaryBtn.textContent = '접속하기';
                primaryBtn.style.display = 'inline-block';
                copyBtn.style.display = 'inline-block';
            } else { // 'folder'
                primaryBtn.textContent = '열기';
                primaryBtn.style.display = 'inline-block';
                copyBtn.style.display = 'none';
            }
            actionModal.style.display = 'flex';
        }

        // --- 폼 모달 열기 (추가/수정용) ---
        function openFormModal(type) {
            const nameInput = document.getElementById('item-name-input');
            const urlInput = document.getElementById('item-url-input');
            const urlField = document.querySelector('.form-field-url');
            const title = document.getElementById('modal-title');
            const saveBtn = document.getElementById('modal-save-btn');
            const colorField = document.querySelector('.form-field-color');
            const colorInput = document.getElementById('item-color-input');

            if (editingItem) {
                // --- 수정 모드 ---
                nameInput.value = editingItem.name;
                saveBtn.textContent = '수정';
                
                if (editingItem.type === 'link') {
                    title.textContent = '바로가기 수정';
                    urlInput.value = editingItem.url;
                    urlField.style.display = 'block';
                    colorField.style.display = 'none';
                } else { // 폴더 수정
                    title.textContent = '폴더 이름 수정';
                    urlInput.value = '';
                    urlField.style.display = 'none';
                    colorField.style.display = 'flex';
                    colorInput.value = editingItem.color || '#fff3cd';
                }
            } else {
                // --- 새 항목 추가 모드 (링크만 가능) ---
                nameInput.value = '';
                urlInput.value = '';
                title.textContent = '새 바로가기 추가';
                saveBtn.textContent = '추가';
                urlField.style.display = 'block';
                colorField.style.display = 'none';
            }
            
            formModal.style.display = 'flex';
        }

        // --- 데이터 보존을 위한 파일 저장 함수 ---
        function saveToFile() {
            const newHtml = document.documentElement.cloneNode(true);
            const scriptTag = newHtml.querySelector('script');
            
            const newDataStoreString = JSON.stringify(dataStore, null, 4);
            
            const oldScriptContent = scriptTag.innerHTML;
            const newScriptContent = oldScriptContent.replace(
                /let dataStore = \[(.|\n)*?\];/, 
                `let dataStore = ${newDataStoreString};`
            );
            
            scriptTag.innerHTML = newScriptContent;

            const blob = new Blob([newHtml.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '바로가기.html';
            a.click();
            
            URL.revokeObjectURL(a.href);
            showNotification('파일이 저장되었습니다! 이제 이 새 파일을 사용하세요.');
        }


        // --- 이벤트 리스너 ---

        // 폼 모달 (추가/수정) 저장 버튼
        document.getElementById('modal-save-btn').addEventListener('click', () => {
            const name = document.getElementById('item-name-input').value.trim();
            const url = document.getElementById('item-url-input').value.trim();
            
            if (editingItem) {
                // --- 수정 로직 ---
                if (!name) { alert('이름을 입력해주세요.'); return; }
                editingItem.name = name;
                if (editingItem.type === 'link') {
                    if (!url) { alert('주소를 입력해주세요.'); return; }
                    editingItem.url = url;
                } else {
                    editingItem.color = document.getElementById('item-color-input').value;
                }
                showNotification('수정되었습니다. [파일로 저장하기]를 눌러주세요!');
            } else {
                // --- 새 링크 추가 로직 ---
                if (name && url) {
                    const newItem = { type: 'link', name, url };
                    const currentFolder = navigationStack[navigationStack.length - 1];
                    currentFolder.items.push(newItem);
                    showNotification('바로가기가 추가되었습니다. [파일로 저장하기]를 눌러주세요!');
                } else {
                    alert('이름과 주소를 모두 입력해주세요.');
                    return;
                }
            }
            
            editingItem = null;
            renderCurrentView();
            formModal.style.display = 'none';
        });

        // 폼 모달 취소
        document.getElementById('modal-cancel-btn').addEventListener('click', () => { 
            formModal.style.display = 'none'; 
            editingItem = null;
        });

        // --- ✨ [요청 2] 액션 모달 - '열기' / '접속하기' 버튼 ---
        document.getElementById('action-primary-btn').addEventListener('click', () => {
            if (!currentActionItem) return;
            const item = currentActionItem.item;

            if (item.type === 'link' && item.url) {
                window.open(item.url, '_blank');
            } else if (item.type === 'folder') {
                navigationStack.push(item);
                renderCurrentView();
            }
            actionModal.style.display = 'none';
        });

        // 액션 모달 - 주소 복사
        document.getElementById('action-copy-btn').addEventListener('click', () => {
            if (currentActionItem && currentActionItem.item.type === 'link' && currentActionItem.item.url) { 
                navigator.clipboard.writeText(currentActionItem.item.url).then(() => { 
                    showNotification('주소가 클립보드에 복사되었습니다!'); 
                }); 
            }
            actionModal.style.display = 'none';
        });

        // 액션 모달 - 수정하기
        document.getElementById('action-edit-btn').addEventListener('click', () => {
            if (currentActionItem) {
                editingItem = currentActionItem.item;
                actionModal.style.display = 'none';
                openFormModal(editingItem.type);
            }
        });

        // 액션 모달 - 삭제하기
        document.getElementById('action-delete-btn').addEventListener('click', () => {
            if (currentActionItem) {
                const itemType = currentActionItem.item.type === 'folder' ? '폴더' : '항목';
                if (confirm(`'${currentActionItem.item.name}' ${itemType}을(를) 정말로 삭제하시겠습니까?`)) {
                    currentActionItem.array.splice(currentActionItem.index, 1);
                    renderCurrentView();
                    showNotification('삭제되었습니다. [파일로 저장하기]를 눌러주세요!');
                }
            }
            actionModal.style.display = 'none';
        });

        // 액션 모달 - 닫기
        document.getElementById('action-close-btn').addEventListener('click', () => { 
            actionModal.style.display = 'none'; 
        });

        // --- ✨ [요청 1] 순서 변경 모드 버튼 클릭 ---
        reorderModeBtn.addEventListener('click', () => {
            isReorderMode = !isReorderMode; // 모드 토글
            reorderModeBtn.classList.toggle('reorder-mode-active', isReorderMode);
            container.classList.toggle('reorder-mode-on', isReorderMode); // 커서 변경용 클래스
            
            if (isReorderMode) {
                showNotification('순서 변경 모드가 켜졌습니다. 드래그하여 순서를 바꾸세요.');
            } else {
                showNotification('순서 변경 모드가 꺼졌습니다. 폴더로 드래그하여 이동하세요.');
            }
        });

        // --- 새 폴더 추가 버튼 ---
        addFolderBtn.addEventListener('click', () => {
            const folderName = prompt('새 폴더의 이름을 입력하세요:');
            if (folderName && folderName.trim()) {
                const newFolder = {
                    type: 'folder',
                    name: folderName.trim(),
                    items: [],
                    color: '#fff3cd'
                };
                const currentFolder = navigationStack[navigationStack.length - 1];
                currentFolder.items.push(newFolder);
                renderCurrentView();
                showNotification('새 폴더가 추가되었습니다. [파일로 저장하기]를 눌러주세요!');
            }
        });

        // 파일로 저장하기 버튼
        saveAsFileBtn.addEventListener('click', saveToFile);

        // 페이지 로드 시 초기 렌더링
        renderCurrentView();
    </script>

</body></html>
