<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물질의 상태 변화 시뮬레이터 (Shape Memory Update)</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Jua', sans-serif;
            background-color: #f4f9f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 1.8rem;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 720px; 
            box-sizing: border-box;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f9f9f9;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        input[type="range"] {
            width: 140px;
            cursor: pointer;
        }
        select {
            font-family: 'Jua', sans-serif;
            font-size: 1rem;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
            border: 2px solid #3498db;
            outline: none;
        }
        .info-panel {
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #e8f4f8;
            border-radius: 10px;
            border: 2px solid #bce0fd;
        }
        .canvas-container {
            width: 100%;
            position: relative;
        }
        canvas {
            width: 100%; 
            height: auto; 
            background-color: #ffffff;
            border: 3px solid #34495e;
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            display: block;
        }
        .notice {
            font-size: 0.85rem;
            color: #e74c3c;
            margin-top: 15px;
            line-height: 1.4;
            text-align: left;
            background: #fff0f0;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>🔍 물질의 상태 변화 시뮬레이터</h1>
    
    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label for="tempSlider" id="tempLabel">온도 (에너지): 50</label>
                <input type="range" id="tempSlider" min="-50" max="250" value="50">
            </div>
            <div class="control-group">
                <label for="pressSlider" id="pressLabel">압력: 10</label>
                <input type="range" id="pressSlider" min="0" max="300" value="10">
            </div>
            <div class="control-group">
                <label for="shapeSelect">용기 모양</label>
                <select id="shapeSelect">
                    <option value="rect">기본 사각형 (비커)</option>
                    <option value="v">V자형 (깔때기)</option>
                    <option value="flask">삼각 플라스크</option>
                </select>
            </div>
        </div>

        <div class="info-panel" id="statusText">
            현재 상태: 계산 중... | 분자 수: 160개 (유지됨)
        </div>

        <div class="canvas-container">
            <canvas id="simCanvas" width="680" height="500"></canvas>
        </div>

        <div class="notice">
            * <b>부피와 모양:</b> 액체는 분자 간격이 넓고 용기 모양에 맞춰 변하지만, 고체는 원래 형성된 <b>일정한 모양과 부피를 유지</b>합니다.<br>
            * <b>강체 물리(Rigid Body):</b> 고체 상태일 때 용기를 바꾸면 고체 덩어리는 흩어지지 않고 그 형태 그대로 떨어집니다.<br>
            * <b>질량 보존:</b> 용기 모양이 변하거나 상태가 변해도 분자의 개수는 160개로 절대 변하지 않습니다.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const tempSlider = document.getElementById('tempSlider');
        const pressSlider = document.getElementById('pressSlider');
        const shapeSelect = document.getElementById('shapeSelect');
        const statusText = document.getElementById('statusText');
        const tempLabel = document.getElementById('tempLabel');
        const pressLabel = document.getElementById('pressLabel');

        const W = canvas.width;
        const H = canvas.height;
        const NUM_PARTICLES = 160; 
        const R = 9; 
        
        let particles = [];
        let pistonY = 50; 
        let currentPhase = 'liquid';

        // 🧊 고체 형상 기억(강체 물리)을 위한 변수
        let isSolidified = false;
        let solidCOM = { x: 0, y: 0, vx: 0, vy: 0 }; // Center of Mass (무게 중심)

        function initParticles() {
            particles = [];
            for (let i = 0; i < NUM_PARTICLES; i++) {
                particles.push({
                    x: W / 2 + (Math.random() - 0.5) * 100,
                    y: H / 2 + (Math.random() - 0.5) * 100,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    offsetX: 0, // 고체일 때 무게중심으로부터의 상대 X 위치
                    offsetY: 0  // 고체일 때 무게중심으로부터의 상대 Y 위치
                });
            }
        }

        // 유체(액체/기체)일 때 개별 분자의 벽면 충돌 처리
        function applyWalls(p) {
            let shape = shapeSelect.value;
            if (p.y < pistonY + R) { p.y = pistonY + R + Math.random(); p.vy = Math.abs(p.vy); }
            if (p.y > H - R) { p.y = H - R - Math.random(); p.vy *= -0.5; }
            if (p.x < R) { p.x = R + Math.random(); p.vx *= -0.5; }
            if (p.x > W - R) { p.x = W - R - Math.random(); p.vx *= -0.5; }

            if (shape === 'v') {
                let leftBound = 260 - (H - p.y) * 0.6;
                let rightBound = (W - 260) + (H - p.y) * 0.6;
                if (p.x < leftBound + R) { p.x = leftBound + R + Math.random(); p.vx = Math.abs(p.vx) * 0.5; }
                if (p.x > rightBound - R) { p.x = rightBound - R - Math.random(); p.vx = -Math.abs(p.vx) * 0.5; }
            } else if (shape === 'flask') {
                let leftBound, rightBound;
                if (p.y < 200) { leftBound = W / 2 - 80; rightBound = W / 2 + 80; } 
                else {
                    let dy = p.y - 200;
                    leftBound = (W / 2 - 80) - dy * (200 / 300);
                    rightBound = (W / 2 + 80) + dy * (200 / 300);
                }
                if (p.x < leftBound + R) { p.x = leftBound + R + Math.random(); p.vx = Math.abs(p.vx) * 0.5; }
                if (p.x > rightBound - R) { p.x = rightBound - R - Math.random(); p.vx = -Math.abs(p.vx) * 0.5; }
            }
        }

        function update() {
            let T = parseInt(tempSlider.value);
            let P = parseInt(pressSlider.value);

            tempLabel.innerText = `온도 (에너지): ${T}`;
            pressLabel.innerText = `압력: ${P}`;

            // 피스톤 제어
            let targetPistonY = 200 - (T * 0.7) + (P * 0.8);
            if (targetPistonY < 40) targetPistonY = 40; 
            if (targetPistonY > H - 240) targetPistonY = H - 240; 
            pistonY += (targetPistonY - pistonY) * 0.1;

            // 에너지 기반 상태 판별
            let energy = T - (P * 0.5); 
            let nextPhase = 'liquid';
            if (energy > 100) nextPhase = 'gas';
            else if (energy > -10) nextPhase = 'liquid';
            else nextPhase = 'solid';

            // 💧 융해 (고체 -> 액체/기체): 잠금 해제
            if (nextPhase !== 'solid' && isSolidified) {
                isSolidified = false;
                for (let p of particles) {
                    p.vx = solidCOM.vx + (Math.random() - 0.5) * 4; // 결합이 풀리며 살짝 튕겨나감
                    p.vy = solidCOM.vy + (Math.random() - 0.5) * 4;
                }
            }

            currentPhase = nextPhase;

            let phaseStr = currentPhase === 'solid' ? 
                            (isSolidified ? '🧊 고체 (형태 완벽 유지, 미세 진동)' : '🧊 고체 (결빙 중...)') : 
                           currentPhase === 'liquid' ? '💧 액체 (용기 모양 변화, 부피 팽창)' : '☁️ 기체 (매우 자유로움)';
            statusText.innerHTML = `현재 상태: <strong>${phaseStr}</strong> | 분자 수: <strong>${NUM_PARTICLES}개</strong>`;

            // ==========================================
            // [1] 강체(고체 덩어리) 물리 업데이트 구역
            // ==========================================
            if (currentPhase === 'solid' && isSolidified) {
                // 고체 덩어리 전체에 중력 및 마찰 적용
                solidCOM.vy += 0.5; 
                solidCOM.vy *= 0.95; 
                solidCOM.vx *= 0.90;
                
                solidCOM.x += solidCOM.vx;
                solidCOM.y += solidCOM.vy;
                
                let pushX = 0, pushY = 0;
                let shape = shapeSelect.value;
                
                // 덩어리가 벽을 뚫었는지 검사하여 가장 깊이 박힌 값을 기준으로 덩어리 전체를 밀어냄
                for (let p of particles) {
                    let px = solidCOM.x + p.offsetX;
                    let py = solidCOM.y + p.offsetY;
                    let pX = 0, pY = 0;
                    
                    if (py < pistonY + R) pY = (pistonY + R) - py;
                    else if (py > H - R) pY = (H - R) - py;
                    
                    if (px < R) pX = R - px;
                    else if (px > W - R) pX = (W - R) - px;
                    
                    if (shape === 'v') {
                        let leftBound = 260 - (H - py) * 0.6;
                        let rightBound = (W - 260) + (H - py) * 0.6;
                        if (px < leftBound + R) pX = (leftBound + R) - px;
                        else if (px > rightBound - R) pX = (rightBound - R) - px;
                    } else if (shape === 'flask') {
                        let leftBound, rightBound;
                        if (py < 200) { leftBound = W/2 - 80; rightBound = W/2 + 80; }
                        else {
                            let diff = py - 200;
                            leftBound = (W/2 - 80) - diff * (200/300);
                            rightBound = (W/2 + 80) + diff * (200/300);
                        }
                        if (px < leftBound + R) pX = (leftBound + R) - px;
                        else if (px > rightBound - R) pX = (rightBound - R) - px;
                    }
                    if (Math.abs(pX) > Math.abs(pushX)) pushX = pX;
                    if (Math.abs(pY) > Math.abs(pushY)) pushY = pY;
                }
                
                // 벽과 충돌 시 부드럽게 튕겨내기
                solidCOM.x += pushX * 0.5; 
                solidCOM.y += pushY * 0.5;
                if (pushX !== 0) solidCOM.vx *= 0.5;
                if (pushY !== 0) solidCOM.vy *= 0.5;
                
                let vibration = Math.max(0, (T + 50) * 0.015); 
                
                // 중심점에 맞춰 개별 분자들 위치 강제 고정 (형태 유지)
                for (let p of particles) {
                    let vibX = (Math.random() - 0.5) * vibration;
                    let vibY = (Math.random() - 0.5) * vibration;
                    p.x = solidCOM.x + p.offsetX + vibX;
                    p.y = solidCOM.y + p.offsetY + vibY;
                    p.vx = 0; p.vy = 0;
                }
            } 
            // ==========================================
            // [2] 유체(액체/기체/결빙 중) 물리 업데이트 구역
            // ==========================================
            else {
                let totalSpeed = 0;
                
                for (let i = 0; i < NUM_PARTICLES; i++) {
                    let p = particles[i];

                    if (currentPhase === 'solid' && !isSolidified) {
                        // 🧊 결빙 중: 엄청나게 빠른 속도로 뭉침
                        p.vy += 3.0; p.vx *= 0.5; p.vy *= 0.8; 
                    } else if (currentPhase === 'liquid') {
                        p.vy += 0.15; 
                        p.vx += (Math.random() - 0.5) * (T * 0.005 + 0.1);
                        p.vy += (Math.random() - 0.5) * (T * 0.005 + 0.1);
                        p.vx *= 0.95; p.vy *= 0.95;
                    } else if (currentPhase === 'gas') {
                        let speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                        let targetSpeed = 3 + (T * 0.03);
                        if (speed < targetSpeed) { p.vx *= 1.05; p.vy *= 1.05; }
                        if (speed === 0) { p.vx = 1; p.vy = 1; }
                    }

                    p.x += p.vx; p.y += p.vy;
                    totalSpeed += Math.sqrt(p.vx*p.vx + p.vy*p.vy);

                    applyWalls(p);

                    // 분자 간 상호작용
                    for (let j = i + 1; j < NUM_PARTICLES; j++) {
                        let p2 = particles[j];
                        let dx = p2.x - p.x; let dy = p2.y - p.y;
                        if (dx === 0 && dy === 0) {
                            dx = (Math.random() - 0.5) * 0.5; dy = (Math.random() - 0.5) * 0.5;
                        }

                        let distSq = dx * dx + dy * dy;
                        let minDist = R * 2.1; 
                        if (currentPhase === 'liquid') minDist = R * 3.3; 
                        if (currentPhase === 'gas') minDist = R * 2.0;
                        let dist = Math.sqrt(distSq);

                        if (dist < minDist) {
                            let overlap = minDist - dist;
                            let force = overlap * 0.2; 
                            if(currentPhase === 'liquid') force = overlap * 0.05; 
                            if(currentPhase === 'solid') force = overlap * 0.6; 
                            if(force > 6) force = 6; 
                            let fx = (dx / dist) * force; let fy = (dy / dist) * force;
                            p.vx -= fx; p.vy -= fy; p2.vx += fx; p2.vy += fy;
                        } 
                        
                        if (currentPhase === 'liquid' && dist < R * 4.5) {
                            let pull = 0.003; 
                            p.vx += (dx / dist) * pull; p.vy += (dy / dist) * pull;
                            p2.vx -= (dx / dist) * pull; p2.vy -= (dy / dist) * pull;
                        }
                        else if (currentPhase === 'solid' && dist < R * 4.0) {
                            let pull = 0.15; 
                            p.vx += (dx / dist) * pull; p.vy += (dy / dist) * pull;
                            p2.vx -= (dx / dist) * pull; p2.vy -= (dy / dist) * pull;
                        }
                    }
                }
                
                // ❄️ 결빙 완료 체크: 분자들이 다 뭉치고 멈추면 형태 잠금(Lock)
                if (currentPhase === 'solid' && !isSolidified) {
                    if (totalSpeed < NUM_PARTICLES * 0.8) { 
                        isSolidified = true;
                        let cx = 0, cy = 0;
                        for(let p of particles) { cx += p.x; cy += p.y; }
                        solidCOM.x = cx / NUM_PARTICLES;
                        solidCOM.y = cy / NUM_PARTICLES;
                        solidCOM.vx = 0; solidCOM.vy = 0;
                        
                        // 현재의 뭉쳐진 모양을 기억
                        for(let p of particles) {
                            p.offsetX = p.x - solidCOM.x;
                            p.offsetY = p.y - solidCOM.y;
                        }
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            let shape = shapeSelect.value;
            ctx.fillStyle = '#95a5a6';
            if (shape === 'v') {
                ctx.beginPath(); ctx.moveTo(0, H); ctx.lineTo(260, H); ctx.lineTo(0, H - 260/0.6); ctx.fill();
                ctx.beginPath(); ctx.moveTo(W, H); ctx.lineTo(W - 260, H); ctx.lineTo(W, H - 260/0.6); ctx.fill();
            } else if (shape === 'flask') {
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(W/2 - 80, 0); ctx.lineTo(W/2 - 80, 200); ctx.lineTo(W/2 - 280, H); ctx.lineTo(0, H); ctx.fill();
                ctx.beginPath(); ctx.moveTo(W,0); ctx.lineTo(W/2 + 80, 0); ctx.lineTo(W/2 + 80, 200); ctx.lineTo(W/2 + 280, H); ctx.lineTo(W, H); ctx.fill();
            }

            ctx.fillStyle = '#bdc3c7';
            ctx.fillRect(0, 0, W, pistonY);
            ctx.fillStyle = '#7f8c8d';
            ctx.fillRect(0, pistonY - 6, W, 6); 
            ctx.fillStyle = '#2c3e50';
            ctx.font = '22px Jua';
            ctx.fillText('⬇️ 누르는 압력 ⬇️', W / 2 - 70, pistonY / 2 + 10);

            for (let i = 0; i < NUM_PARTICLES; i++) {
                let p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, R, 0, Math.PI * 2);
                if(currentPhase === 'gas') ctx.fillStyle = '#e74c3c'; 
                else if(currentPhase === 'liquid') ctx.fillStyle = '#3498db'; 
                else ctx.fillStyle = '#1e3799'; 
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.closePath();
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        initParticles();
        loop();
    </script>
</body>
</html>
